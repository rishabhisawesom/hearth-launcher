name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: swift build -v

      - name: Test
        run: |
          for pkg in Packages/*/; do
            echo "Testing $pkg"
            swift test --package-path "$pkg" -v
          done
